<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Axolotl Clicker 🐟</title>
  <link rel="stylesheet" href="axoboys.github.io/css/styleClicker.css">
</head>
<body>

<div class="container">
  <h1>Axolotl Clicker 🐟</h1>

  <!-- Connexion / Inscription -->
  <div id="auth">
    <h2>Connexion Twitch</h2>
    <button onclick="loginWithTwitch()">Se connecter avec Twitch</button>
  </div>

  <!-- Clicker -->
  <div id="game" style="display:none;">
    <p>Score : <span id="score">0</span> AxoCoins</p>
    <p>Prestiges : <span id="prestigeCount">0</span></p>
    <p>Clicks par seconde : <span id="cps">0</span></p>
    <button onclick="clicker()">Clique !</button>
    <span>Score : <span id="score">0</span> AxoCoins</span>

    <h2>Magasin 🏗️</h2>
    <div class="shop" id="shop"></div>

    <h2>Prestige / Rebirth 🔁</h2>
    <button class="prestige-btn" onclick="prestige()">Prestige</button>
    <p>Il te faut <span id="prestigeCost">1000</span> AxoCoins pour Prestige</p>

    <h2>Classement 🏆</h2>
    <div id="leaderboard"></div>
    <button onclick="logout()">Déconnexion</button>
  </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="scriptC.js"></script>
</body>
</html>
