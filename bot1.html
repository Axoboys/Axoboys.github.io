    <script>
        // Easter Egg: mode arc-en-ciel avec Konami Code
        const easterEggCode = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65]; // ↑↑↓↓←→←→BA
        let codePosition = 0;

        document.addEventListener('keydown', (e) => {
            if (e.keyCode === easterEggCode[codePosition]) {
                codePosition++;
                if (codePosition === easterEggCode.length) {
                    activateEasterEgg();
                    codePosition = 0;
                }
            } else {
                codePosition = 0;
            }
        });

        function activateEasterEgg() {
            alert("🎉 Mode arc-en-ciel activé !");
            document.body.classList.add('rainbow-mode');
            document.querySelector('.main-title').classList.add('rainbow-title');
            document.querySelectorAll('.card a').forEach(a => a.classList.add('rainbow-link'));
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const searchBox = document.getElementById("searchBox");
            const searchIcon = document.getElementById("searchIcon");
            const searchInput = document.getElementById("searchInput");
            const cards = document.querySelectorAll(".card");

            searchIcon.addEventListener("click", () => {
                searchBox.classList.toggle("active");
                searchInput.focus();

                if (!searchBox.classList.contains("active")) {
                    searchInput.value = "";
                    filterCommands("");
                }
            });

            searchInput.addEventListener("keyup", () => {
                filterCommands(searchInput.value);
            });

            function filterCommands(value) {
                const searchValue = value.toLowerCase();

                cards.forEach(card => {
                    const text = card.innerText.toLowerCase();

                    if (text.includes(searchValue)) {
                        card.style.display = "block";
                    } else {
                        card.style.display = "none";
                    }
                });
            }

        });
    </script>
